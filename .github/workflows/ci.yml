name: GraphSense CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend checks ─────────────────────────────────────────
  backend:
    name: Backend — Install & Verify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify .env.example exists
        run: |
          test -f .env.example || (echo ".env.example missing" && exit 1)
          echo "✅ .env.example found"

      - name: Verify backend entrypoint exists
        run: |
          test -f src/server.js || (echo "src/server.js missing" && exit 1)
          echo "✅ Backend entrypoint found"

      - name: Syntax check backend
        run: |
          node --check src/server.js
          echo "✅ Syntax valid"

  # ── Frontend checks ────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        env:
          REACT_APP_API_URL: https://graphsense-api.onrender.com
          CI: false
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f build/index.html || (echo "build/index.html missing" && exit 1)
          echo "✅ Build succeeded"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build/
          retention-days: 7
